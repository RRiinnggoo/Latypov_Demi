<section class="showcase" data-slider>
    <div class="showcase-stage">
        <article class="showcase-slide is-active">
            <div class="slide-card slide-card-a">
                <img src="static/training/img/image.jpeg" alt="Разные сферы деятельности" onerror="this.remove()">
                <span>01</span>
                <strong>Разные сферы деятельности</strong>
            </div> 
        </article>
        <article class="showcase-slide">
            <div class="slide-card slide-card-b">
                <img src="static/training/img/image (1).jpeg" alt="Разные возрасты" onerror="this.remove()">
                <span>02</span>
                <strong>Разные возрасты</strong>
            </div>
        </article>
        <article class="showcase-slide">
            <div class="slide-card slide-card-c">
                <img src="static/training/img/image (2).jpeg" alt="Индивидуальное отношение к каждому" onerror="this.remove()">
                <span>03</span>
                <strong>Индивидуальное отношение к каждому</strong>
            </div>
        </article>
        <article class="showcase-slide">
            <div class="slide-card slide-card-d">
                <img src="static/training/img/image (3).jpeg" alt="Высокие результаты" onerror="this.remove()">
                <span>04</span>
                <strong>Высокие результаты</strong>
            </div>
        </article>
    </div>
    <div class="showcase-controls">
        <button type="button" data-prev aria-label="Предыдущий слайд">Назад</button>
        <div class="showcase-dots" aria-hidden="true">
            <span class="is-active"></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <button type="button" data-next aria-label="Следующий слайд">Вперёд</button>
    </div>
</section>
