{% extends 'training/form_base.html' %}

{% block title %}Вход | Учусь РФ{% endblock %}
 
{% block form_content %}
<p class="kicker">авторизация</p>
<h1>Вход</h1>
<form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
        <label class="field">
            <span>{{ field.label }}</span>
            {{ field }}
            {% for error in field.errors %}<small>{{ error }}</small>{% endfor %}
        </label>
    {% endfor %}
    {% for error in form.non_field_errors %}<div class="form-alert">{{ error }}</div>{% endfor %}
    <button class="action action-primary action-wide btn" type="submit">Войти</button>
</form>
<a class="text-link" href="{% url 'signup' %}">Ещё не зарегистрированы?</a>
{% endblock %}
